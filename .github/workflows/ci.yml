name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write   # push tags, create releases, push gh-pages
  packages: write   # push to ghcr.io

concurrency:
  group: ${{ github.event_name == 'push' && 'release' || format('pr-{0}', github.ref) }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      artisan: ${{ steps.filter.outputs.artisan }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            artisan:
              - 'artisan/**'
              - 'Dockerfile.flutter'
              - 'static-web-server.toml'
            client:
              - 'client/**'
              - 'Dockerfile.flutter'
              - 'static-web-server.toml'

  check-backend:
    needs: changes
    # On main pushes always run (a release builds all images); on PRs only when changed
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
        working-directory: backend
      - run: ruff check .
        working-directory: backend
      - run: pytest -v
        working-directory: backend

  check-flutter:
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.artisan == 'true' ||
      needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        app: [artisan, client]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: ${{ matrix.app }}
      - run: flutter analyze
        working-directory: ${{ matrix.app }}
      # --platform chrome: apps are web-only (dart:js_interop), tests are @TestOn('chrome');
      # ubuntu-latest runners have Chrome preinstalled
      - run: flutter test --platform chrome
        working-directory: ${{ matrix.app }}

  version:
    if: github.event_name == 'push'
    needs: [check-backend, check-flutter]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.tag.outputs.new_version }}
      tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute SemVer from Conventional Commits and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: patch

  image-backend:
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64
          push: true
          tags: ghcr.io/jabbas/ibakery-backend:${{ needs.version.outputs.version }}
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}

  image-flutter:
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - app: artisan
            base_href: /artisan/
          - app: client
            base_href: /
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: ${{ matrix.app }}
      - name: Build Flutter web
        run: >-
          flutter build web --release --pwa-strategy none
          --base-href=${{ matrix.base_href }}
          --dart-define=APP_VERSION=${{ needs.version.outputs.version }}
        working-directory: ${{ matrix.app }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.flutter
          platforms: linux/amd64
          push: true
          tags: ghcr.io/jabbas/ibakery-${{ matrix.app }}:${{ needs.version.outputs.version }}
          build-args: |
            BUILD_DIR=${{ matrix.app }}/build/web
            BASE_HREF=${{ matrix.base_href }}

  chart:
    needs: [version, image-backend, image-flutter]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set chart versions
        env:
          V: ${{ needs.version.outputs.version }}
        run: |
          for f in helm/Chart.yaml helm/charts/backend/Chart.yaml helm/charts/artisan/Chart.yaml helm/charts/client/Chart.yaml; do
            yq -i ".version = strenv(V) | .appVersion = strenv(V)" "$f"
          done
          # umbrella dependency constraints must match the bumped subchart versions,
          # otherwise `helm package --dependency-update` cannot resolve the file:// deps
          yq -i '.dependencies[].version = strenv(V)' helm/Chart.yaml
      - name: Package umbrella chart
        run: |
          mkdir -p .cr-release-packages
          helm package helm/ --dependency-update -d .cr-release-packages
          ls -l .cr-release-packages
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      # Manual publish (chart-releaser-action@v1.7.0 crashes with skip_packaging:
      # "latest_tag: unbound variable"); this is deterministic and idempotent.
      - name: Publish chart to GitHub release and gh-pages index
        env:
          V: ${{ needs.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG=".cr-release-packages/ibakery-${V}.tgz"
          gh release view "ibakery-${V}" >/dev/null 2>&1 \
            || gh release create "ibakery-${V}" "$PKG" --title "ibakery-${V}" --notes "Helm chart ibakery ${V}"
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages FETCH_HEAD
          if [ -f /tmp/gh-pages/index.yaml ]; then
            helm repo index .cr-release-packages \
              --url "https://github.com/jabbas/ibakery/releases/download/ibakery-${V}" \
              --merge /tmp/gh-pages/index.yaml
          else
            helm repo index .cr-release-packages \
              --url "https://github.com/jabbas/ibakery/releases/download/ibakery-${V}"
          fi
          cp .cr-release-packages/index.yaml /tmp/gh-pages/index.yaml
          cd /tmp/gh-pages
          git add index.yaml
          if git diff --cached --quiet; then
            echo "Index unchanged"
          else
            git commit -m "ibakery ${V}"
            git push origin HEAD:gh-pages
          fi

  deploy-bump:
    needs: [version, chart]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          repository: jabbas/flux-homeapps
          token: ${{ secrets.FLUX_HOMEAPPS_TOKEN }}
      - name: Bump ibakery chart version
        env:
          V: ${{ needs.version.outputs.version }}
        run: |
          yq -i '.spec.chart.spec.version = strenv(V)' applications/ibakery/release.yaml
          if git diff --quiet; then
            echo "Version already ${V}, nothing to bump"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "ibakery ${V}"
            git push
          fi
